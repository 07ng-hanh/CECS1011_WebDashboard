<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Scanner</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
              integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
              crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
          integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script type="module">

        import QrScanner from './lib/qr-scanner.min.js';


        function processQrResult(result) {
            console.log(result.data)
            let id = parseInt(result.data)
            qrScanner.stop()
            qrScanner = null
            window.location.href = `lookup.html?id=${id}`
        }

        let videoElem = undefined
        let canvas = undefined
        let ctx = undefined
        let qrScanner = undefined
        document.addEventListener("DOMContentLoaded", () => {

            videoElem = document.getElementById("video-in")

            qrScanner = new QrScanner(
                videoElem,
                result => processQrResult(result),
                {
                    preferredCamera: 'environment',
                }
            )
            qrScanner.start();
            document.getElementById("scan-region-container").appendChild(qrScanner.$canvas)
        })

        window.addEventListener("beforeunload", () => {
            qrScanner.stop()
            qrScanner = null
        })
    </script>
</head>
<body style="background: black">
    <video hidden id="video-in"></video>
    <button class="btn btn-secondary" style="margin: 10px; position: fixed" onclick="window.location.href = 'dashboard.html'">X</button>
    <div style="display: flex; width:100%; height: 100dvh; justify-content: center; align-items:center; flex-direction: column  " id="scan-region-container">
        <h2 style="color: white; font-weight: bold"> <i class="bi bi-qr-code-scan"></i> Scan batch QR here</h2>

    </div>

</body>
</html>
