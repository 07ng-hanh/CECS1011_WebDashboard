    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css"
          integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.7/awesomplete.min.css"
          integrity="sha512-YKJCE4m/eXP9bG0UEQp6Y4It4J1byWp9gN4vxtD4QHuUm26JV7D2Vue2CDrBjQvcRy3mKxlwgrGV+d4j7EZB8Q=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

            integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
            integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <meta charset="UTF-8">

</head>
<body>

<span style="display: flex; align-items: center; gap: 10px; padding: 10px; position: fixed; background: white; width: 100%; z-index: 10 ">
    <button class="btn btn-secondary" onclick="window.location.href = 'lookup.html'">X</button>
    <label style="margin-bottom: 0px" for="produce-name" class="form-label"><b>Assign Shipment</b> <b>for <span id="prod-count">500</span> <span id="prod-name">Product-Name</span> (<span>xx</span> days shelf life remaining)</b></label>

</span>

<div style="position: absolute; top: 85px; width: 100%;">

    <div style="display: flex; flex-direction: column; gap: 10px; padding: 10px; padding-top: 0px;">

        <input autofocus class="form-control" type="input" placeholder="Search Shipment Details">
        <button class="btn btn-primary">Search</button>
        <table class="table table-striped" style="padding: 10px">
            <thead style="font-weight: bold">
            <tr>
                <td>
                    Select
                </td>
                <td>
                    Shipment Details
                </td>
                <td>
                    Scheduled Departure Date
                </td>
                <td>
                    ETA
                </td>
                <td>
                    Suggested?
                </td>
            </tr>
            </thead>
            <tbody>
            <tr class="suggested-row">
                <td>
                    <input data-order-id="000000" class="form-control" type="checkbox">
                </td>
                <td>#000000 PortA <i class="bi bi-arrow-right"></i>
                    PortB <br>(500 Product-Types)
                </td>
                <td>YYYY-MM-DD</td>
                <td class="accented-indicator">3 days</td>
                <td>Yes</td>
            </tr>
            </tbody>
        </table>
    </div>

    <p style="padding: 10px">&nbsp;</p>

</div>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: fixed; bottom: 10px; right: 10px; left: 10px">
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-secondary" onclick="window.location.href = 'lookup.html'">Discard</button>
</div>
</body>
</html>
