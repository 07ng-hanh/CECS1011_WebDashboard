<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Settings</title>
</head>
<body>
    <button onclick="window.location.href = 'dashboard.html'">X</button>
    <h2>Account Settings</h2>
    <h3 style="font-weight: bold">Reset Password</h3>
    <div style="display: flex; flex-direction: column; gap: 10px">
        <input id="password" type="password" placeholder="Old Password">
        <input id="new-password" type="password" placeholder="New Password">
        <input id="retype-new-password" type="password" placeholder="Retype New Password">
        <span>
        <input type="checkbox" id="show-pwd">
            <label for="show-pwd">Show Password</label>
        </span>
        <button>Update Password</button>
    </div>

</body>
</html>
