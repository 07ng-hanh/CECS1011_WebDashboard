<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <title>Batch Selection</title>

    <style>
        .cb-highlight-hover:hover {
            background: yellow;
        }
    </style>

    <script>
        let page = 1
        let check_state = {}

        window.onunload = (ev) => {
            window.opener.handle_fetch_shipments()
        }

        async function update_entry(batch_id, checked, assigned_order_no) {
            if (checked) {
                const r = await axios.post(`/api/batch/assign-order-to-batch?batch_id=${batch_id}&order_id=${assigned_order_no}`,
                    option={
                        validateStatus: function (status) {
                            return status >= 200 && status <= 500
                        }
                    })
                if (r.status === 200) {
                    document.getElementById("lastUpdate").innerText = new Date()
                } else {
                    alert("Failed to update selection. Error: " + r.status)
                }
                await populateList(page)
            } else {
                const r = await axios.delete(`/api/batch/remove-order-from-batch?batch_id=${batch_id}`)

                if (r.status === 200) {
                    document.getElementById("lastUpdate").innerText = new Date()
                } else {
                    alert("Failed to update selection. Error: " + r.status)
                }

                await populateList(page)
            }
        }

        function is_safe_to_transport(exp_date, scheduled_departure, eta_millisecond) {
            return exp_date > scheduled_departure + eta_millisecond
        }

        function get_localtime_iso_string(date = new Date()) {
            return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`
        }

        function get_iso_from_utc_timestamp(timestamp) {
            return get_localtime_iso_string(new Date(timestamp))
        }

        function show_data(data, scheduled_timestamp, eta_milliseconds, params) {
            const container = document.getElementById("batches-container")
            container.innerHTML = ""

            data.forEach((batch) => {
                const idLbl = document.createElement("p")
                idLbl.innerHTML = `<span>${batch.batch_id}</span>`
                idLbl.style.margin = 'auto'

                const infoLbl = document.createElement("p")
                infoLbl.innerHTML = `<b>${batch.harvest_type_name}</b> (<span>${batch.quantity}</span> units, expires on <span>${ get_iso_from_utc_timestamp(batch.exp_date)}</span>)`
                infoLbl.style.margin = 'auto'
                infoLbl.style.marginLeft = '0'

                const cb = document.createElement("input")
                cb.type = 'checkbox'
                cb.id = 'cb' + batch.batch_id

                const cbLbl = document.createElement("label")
                cbLbl.htmlFor = cb.id
                cbLbl.appendChild(idLbl)
                cbLbl.appendChild(infoLbl)
                cbLbl.className = 'cb-highlight-hover'
                cb.className = 'cb-highlight-hover'

                cbLbl.style.width = '100%'

                container.appendChild(cb)
                container.appendChild(cbLbl)

                if (batch.assigned_order_no) {
                    cb.checked = true
                    check_state[batch.batch_id] = true
                } else {
                    check_state[batch.batch_id] = false
                }

                cb.onchange = async (ev) => {

                    check_state[batch.batch_id] = ev.target.checked
                    await update_entry(batch.batch_id, ev.target.checked, parseInt(params.get("assigned_order_no")))
                }

                if (!is_safe_to_transport(batch.exp_date, scheduled_timestamp, eta_milliseconds )) {
                    cb.disabled = true
                    infoLbl.innerHTML += '<b style="color: red">&nbsp;Unsafe - shipment exceeds expiration date</b>'
                }


            })

        }


<!--        fetch all available batches. if exp_date <= scheduled_departure + eta_millisecond - unsuitable -->

        async function populateList(page) {
            const params = new URLSearchParams(window.location.search)
            const scheduled_timestamp = parseInt(params.get("scheduled_timestamp"))
            const eta_milliseconds = parseInt(params.get("eta_milliseconds"))
            const r = await axios.get("/api/batch/list-batches-for-order", {
                params: {
                    assigned_order_no: parseInt(params.get("assigned_order_no")),
                    produce_type_id: params.get("produce_type_id"),
                    page: page
                },

                validateStatus: (status) => {
                    return status >= 200 && status <= 500
                }

            })
            if (r.status !== 200) {
                alert("Can't fetch batches. Error: " + r.status)

            } else {
                console.log(r.data)
                show_data(r.data, scheduled_timestamp, eta_milliseconds, params)
            }
        }

        async function flipPage(p) {
            page += p
            if (page < 1) {
                page = 1
            }
            document.getElementById("pageCnt").innerText = page
            populateList(page)

        }

        document.addEventListener("DOMContentLoaded",async () => {
            await populateList(page)
        })




    </script>
</head>
<body>
    <div style="padding: 10px; position: fixed; top: 0; width: 100%; z-index: 10">
        <h3>Available Batches</h3>
        <div style=" display: flex; justify-content: space-between">
            <span style="display: flex; align-items: center">
                <button onclick="flipPage(-1)" class="btn btn-link"><</button>
                <p style="margin: 0">Page <span id="pageCnt">1</span></p>
                <button onclick="flipPage(1)" class="btn btn-link">></button>
            </span>
            <span>
                <p style="margin: 0; padding-right: 12px">Last Change: <span id="lastUpdate">null</span></p>
            </span>
        </div>

    </div>

    <div id="batches-container" style="padding: 10px; padding-top: 100px; display: grid; grid-template-columns: 32px 1fr; gap: 5px">

    </div>

    <div style="position: fixed; width: 100%; bottom: 10px; padding-left: 10px; padding-right: 10px">
        <button class="btn btn-block btn-primary" onclick="window.close()">Apply Changes</button>
    </div>

</body>
</html>
