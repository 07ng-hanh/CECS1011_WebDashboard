<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shipment Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
          integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/litepicker.min.js"
            integrity="sha512-yNEsQERO50LM6mQgUWnWFo453wVwrxOzTnCxYgawLggDtt5VuU/U7sAPx1wcHhUvqPbbvwVJgVBnJ+FOOmeZIQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css"
          integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"
            integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
            integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <meta charset="UTF-8">

    <script src="shipments.js"></script>

</head>
<body style="width: 100dvw;">
<!--Order lookup-->

<div class="orders-top-bar-container">
        <span style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px">
            <button onclick="window.location.href = 'dashboard.html'" class="btn btn-secondary">X</button>
            <label style="font-weight: bold; margin: 0">Manage Shipments</label>
        </span>

    <div class="orders-top-bar" id="orders-top-bar">
        <input oninput="debounce_search()" class="form-control" id="shipment-id" placeholder="Shipment ID">
        <input oninput="debounce_search()" class="form-control" id="loc-from" placeholder="From...">
        <input oninput="debounce_search()" class="form-control" id="loc-to" placeholder="To...">
        <input oninput="debounce_search()" class="form-control" id="export-date" placeholder="Departure Schedule (Range YYYY-MM-DD)">
        <input oninput="debounce_search()" class="form-control" id="export-type" placeholder="Produce Type">

        <select onchange="debounce_search()" class="form-control" id="status">
            <option value="status-any">Any Status</option>
            <option value="status-waiting">Pending for Payload</option>
            <option value="status-waiting-late">Pending for Payload (Late)</option>
            <option value="status-ready">Ready to Depart</option>
            <option value="status-ready-late">Ready to Depart (Late)</option>
            <option value="status-departed">Departed</option>
        </select>

        <select onchange="debounce_search()" class="form-control" id="sort-by">
            <option value="sort-default">Sort By...</option>
            <option value="sort-order-id">Order ID</option>
            <option value="sort-departure-port">Departure Port</option>
            <option value="sort-destination-port">Destination Port</option>
            <option value="sort-produce-name">Produce Name</option>
            <option value="sort-quantity">Quantity</option>
            <option value="sort-scheduled-departure">Scheduled Departure Time</option>
        </select>
        <select onchange="debounce_search()" id="sort-direction" class="form-control">
            <option value="ascending">     &#x25B2;  </option>
            <option value="descending">    &#x25BC;  </option>
        </select>


    </div>
    <span style="display: grid; grid-template-columns: 1fr 150px; gap: 10px">
                <button class="btn btn-primary" id="search">Search</button>
                <div hidden class="dropdown">
                  <button style="width: 100%" class="btn btn-secondary dropdown-toggle" href="#" role="button"
                          data-bs-toggle="dropdown" aria-expanded="false">
                    Export as
                  </button>



                  <ul class="dropdown-menu">
                    <li><button class="dropdown-item">CSV (Filtered)</button></li>
                    <li><button class="dropdown-item">XLSX (Filtered)</button></li>
                    <li><button class="dropdown-item">CSV (All)</button></li>
                    <li><button class="dropdown-item">XLSX (All)</button></li>
                  </ul>
                </div>
                <button class="btn btn-secondary" id="clear_filter" onclick="clear_filters()">Clear Filters</button>

            </span>
    <span style="display: flex; align-items: center; justify-content: flex-end">
        <button onclick="flipPage(-1)" class="btn btn-link"><</button>
        <p style="margin: 0">Page <span id="pageCnt">1</span></p>
        <button onclick="flipPage(1)" class="btn btn-link">></button>
    </span>
</div>

<div style="padding-bottom: 100px" class="orders-card-container" id="orders-card-container">

</div>

<div style="position: fixed; bottom: 10px; width: 100%; padding-left: 10px; padding-right: 10px; background: white">
    <button class="btn btn-outline-secondary btn-block" onclick="window.location.href = 'edit-shipment.html'">Add
        shipment
    </button>
</div>

</body>
</html>
