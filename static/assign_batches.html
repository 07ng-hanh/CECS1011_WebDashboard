<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Assign Batches</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
          integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/litepicker.min.js"
            integrity="sha512-yNEsQERO50LM6mQgUWnWFo453wVwrxOzTnCxYgawLggDtt5VuU/U7sAPx1wcHhUvqPbbvwVJgVBnJ+FOOmeZIQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css"
          integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"
            integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
            integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <meta charset="UTF-8">

</head>
<body>

<span style="display: flex; align-items: center; gap: 10px; padding: 10px; position: fixed; background: white; width: 100%; z-index: 10 ">
            <button class="btn btn-secondary" onclick="window.location.href = 'orders.html'">X</button>
            <label style="margin-bottom: 0" class="form-label"><b>Assign Batches</b> (<span
                    id="topbar-fulfilled">300</span>/<span
                    id="topbar-target">500</span>, min. <span>xx</span> days)</label>

        </span>
<div style="position: absolute; top: 50px; width: 100%;">
    <div style="padding: 10px">
        Order <b id="order-id">#000000</b> requires <b id="prod-count">500</b> <b id="prod-name">Product-Type</b> with a
        minimum shelf life of <b id="min-shelf-life">xx days</b>.
        <br>
        Fulfilled: <b id="fulfilled-count">300</b>/<span id="target-count">500</span> units.
    </div>
    <div style="display: flex; flex-direction: column; gap: 10px; padding: 0 10px 10px;">


        <input autofocus class="form-control" type="text" placeholder="Search Batch ID/Name/Quantity">
        <button class="btn btn-primary">Search</button>
        <table class="table table-striped" style="padding: 10px">
            <thead style="font-weight: bold">
            <tr>
                <td>
                    Check
                </td>
                <td>
                    Batch ID/Name/Qty
                </td>
                <td>
                    Shelf Life Remaining
                </td>
                <td>
                    Suggested?
                </td>
            </tr>
            </thead>
            <tbody>
            <tr class="suggested-row">
                <td>
                    <input class="form-control" type="checkbox">
                </td>
                <td>#000000 Product-Name (500 pcs)</td>

                <td class="accented-indicator">3 days</td>
                <td>Yes</td>
            </tr>
            </tbody>
        </table>
    </div>

    <p style="padding: 10px">&nbsp;</p>

</div>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: fixed; bottom: 10px; right: 10px; left: 10px">
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-secondary" onclick="window.location.href = 'orders.html'">Discard</button>
</div>
</body>
</html>
