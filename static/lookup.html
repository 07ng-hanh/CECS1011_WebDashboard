<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
<!--    Lookup filter -->
    <div style="padding: 10px; gap: 10px; display: flex; flex-direction: column; position: fixed; top: 0px; width: 100%; background: white">
        <label for="produce-name" class="form-label">Search for batches</label>

        <div style="display: grid; gap: 10px; grid-template-columns: 2fr 1fr 1fr">
        <input class="form-control" style="width: 100%" name="produce-name" id="produce-name" placeholder="Produce Name or Batch ID" list="produce-list">
        <datalist id="produce-list">
                <!-- TODO: Programmatically set produce list here-->
        </datalist>
            <select id="status-dropdown" class="form-control">
                <option value="">Any Status</option>
                <option value="pending">Available</option>
                <option value="finalized">Marked for export</option>
                <option value="finalized">Exported</option>
                <option value="finalized">Discarded</option>

            </select>
            <input id="exp-date" type="number" class="form-control" placeholder="Max. shelf life (days)" >
        </div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 10px">
            <button class="btn btn-primary" id="search">Search</button>

        </div>

    </div>

<!--Lookup result -->
<!-- Use list of cards for optimized information representation on both mobile and widescreen devices -->
    <div class="card-container">
        <div class="entry-card">
            <img class="entry-card-img" width="100px" height="100px" src="https://placehold.co/100">
            <div class="card-info">
                <b id="batch-name-and-id">#000000 Produce-Name (500 pcs)</b>
                <p class="card-info-entry"> <span class="card-entry-label">Weight:</span> <b id="weight-counter">-- kg</b> </p>
                <p class="card-info-entry"> <span class="card-entry-label">Harvest At:</span> <b id="import-date-entry">DD-MM-YYYY HH:MM:SS</b> </p>
                <p class="card-info-entry"> <span class="card-entry-label">Shelf Life Remaining:</span> <b class="accented-indicator" id="shelf-life-remaining">-- days</b> </p>

                <!-- Different Status Indicators-->
                <!-- When dealing with real data, only one of those shows at the same time -->
                <p class="card-info-entry"> <span class="card-entry-label">Status:</span>
                    <b id="stat-available" class="accented-indicator hidden">Available</b>
                    <b id="stat-marked" class="accented-purple hidden">Marked for export <span id="order-and-place">to PlaceA (order 000000)</span></b>
                    <b id="stat-discarded" class="accented-danger hidden">Discarded (reason: <span id="discard-reason">discard-reason</span></b>
                    <b id="stat-exported" class="accented-green">Exported <span id="exp-order-and-place">to PlaceA (order 000000)</span></b>
                </p>

            </div>
            <div class="entry-card-action-btn">
                <button class="btn btn-outline-primary">Export</button>
                <button class="btn btn-outline-primary">Suggest route</button>
                <button class="btn btn-outline-danger">Discard</button>
            </div>

        </div>

    </div>


</body>
</html>
