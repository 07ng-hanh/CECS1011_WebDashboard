<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Warehouse Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.7/awesomplete.min.css" integrity="sha512-YKJCE4m/eXP9bG0UEQp6Y4It4J1byWp9gN4vxtD4QHuUm26JV7D2Vue2CDrBjQvcRy3mKxlwgrGV+d4j7EZB8Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.7/awesomplete.min.js" integrity="sha512-Pc3/aEr2FIVZhHxe0RAC9SFrd+pxBJHN3pNJfJNTKc2XAFnXUjgQGIh6X935ePSXNMN6rFa3yftxSnZfJE8ZAg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/litepicker.min.js" integrity="sha512-yNEsQERO50LM6mQgUWnWFo453wVwrxOzTnCxYgawLggDtt5VuU/U7sAPx1wcHhUvqPbbvwVJgVBnJ+FOOmeZIQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css" integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        let lst = ["awk"]
        let harvest_date_range_picker = undefined

        document.addEventListener("DOMContentLoaded", () => {

            //     Integrate range-based datepicker with the harvest date range input field
            harvest_date_range_picker = new Litepicker({
                element: document.getElementById("harvest-date-range"),
                mobileFriendly: true,
                format: "YYYY-MM-DD",
                singleMode: false,
                useResetBtn: true,
                  buttonText: {
                    reset: "Reset"
                  },
            })

            // Make Awesomeplete autocomplete bubble open on product search box focused -->
            let produce_name_inputbox = document.getElementById("produce-name")
            console.log(produce_name_inputbox)
            let produce_name_autocomplete =  new Awesomplete(produce_name_inputbox, {
                minChars: 0,
                maxItems: 15,
                list: lst
            })
            console.log(produce_name_autocomplete)
            produce_name_autocomplete.evaluate()
            produce_name_autocomplete.close()
            produce_name_inputbox.addEventListener("focus", () => {
                console.log("focused")
                produce_name_autocomplete.open()
            })

        })






    </script>
</head>
<body>
<!--    Lookup filter -->
    <div style="padding: 10px; gap: 10px; display: flex; flex-direction: column; position: fixed; top: 0px; width: 100%; background: white; z-index: 10">
        <span style="display: flex; align-items: center; gap: 10px">
            <button class="btn btn-secondary" onclick="window.location.href = 'dashboard.html'">X</button>
            <label style="margin-bottom: 0px" for="produce-name" class="form-label"><b>Warehouse Search</b></label>
        </span>

        <div class="lookup-top-bar">
            <input class="form-control" style="width: 100%" name="produce-name" id="produce-name"
                   placeholder="Produce Name or Batch ID">

            <!-- Replacing maximum shelf life with harvest date range.
            This is more flexible and more intuitive than “maximum shelf life.”
            Workers often think in terms of when something came in, not how many days remain. It helps people track
            fresh arrivals and isolate older stock.
            Also, it’s more likely to be available as clean input (date picker)
            -->
            <input id="harvest-date-range" type="text" class="form-control" placeholder="Harvest Date (Range YYYY-MM-DD)" >

            <select id="status-dropdown" class="form-control">
                <option value="">Any Status</option>
                <option value="available">Available</option>
                <option value="marked">Marked for export</option>
                <option value="exported">Exported</option>
                <option value="discarded">Discarded</option>

            </select>

            <span style="display: grid; gap: 10px; grid-template-columns: 1fr 58px">

                <select id="sort-dropdown" class="form-control">
                    <option value="">Sort By...</option>
                    <option value="batchID">Batch ID</option>
                    <option value="produceID">Produce ID</option>
                    <option value="weight">Weight</option>
                    <option value="weight">Quantity</option>
                    <option value="harvestTime">Harvest Date/Time</option>
                    <option value="harvestTime">Remaining Shelf Life</option>

                </select>

                <select id="sort-direction" class="form-control" >
                    <option name="ascending">     &#x25B2;  </option>
                    <option name="descending">    &#x25BC;  </option>
                </select>

            </span>



        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 10px">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" id="almost-expire-toggle" type="checkbox">

                            <label class="form-check-label" for="almost-expire-toggle">Only show almost expired batches</label>
            </div>
            <button class="btn btn-primary" id="search">Search</button>

        </div>


    </div>

<!--Lookup result -->
<!-- Use list of cards for optimized information representation on both mobile and widescreen devices -->
    <div class="card-container">
        <div class="entry-card">
            <img class="entry-card-img" width="100px" height="100px" src="https://placehold.co/100">
            <div class="card-info">
                <b id="batch-name-and-id">#000000 Produce-Name (500 pcs)</b>
                <p class="card-info-entry"> <span class="card-entry-label">Weight:</span> <b id="weight-counter">-- kg</b> </p>
                <p class="card-info-entry"> <span class="card-entry-label">Harvest At:</span> <b id="import-date-entry">DD-MM-YYYY HH:MM:SS</b> </p>
                <p class="card-info-entry"> <span class="card-entry-label">Shelf Life Remaining:</span> <b class="accented-indicator" id="shelf-life-remaining">-- days</b> </p>

                <!-- Different Status Indicators-->
                <!-- When dealing with real data, only one of those shows at the same time -->
                <p class="card-info-entry"> <span class="card-entry-label">Status:</span>
                    <b id="stat-available" class="accented-indicator hidden">Available</b>
                    <b id="stat-marked" class="accented-purple hidden">Marked for export <span id="order-and-place">to PlaceA (order 000000)</span></b>
                    <b id="stat-discarded" class="accented-danger hidden">Discarded (reason: <span id="discard-reason">discard-reason</span></b>
                    <b id="stat-exported" class="accented-green">Exported <span id="exp-order-and-place">to PlaceA (order 000000)</span></b>
                </p>

            </div>
            <div class="entry-card-action-btn">
                <button class="btn btn-outline-primary">Assign/Suggest Shipment</button>
                <button class="btn btn-outline-primary">Batch Health</button>
                <button class="btn btn-outline-danger">Discard</button>
            </div>

        </div>

    </div>


</body>
</html>
