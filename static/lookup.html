<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Warehouse Search</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">


    <script src="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/litepicker.min.js"
            integrity="sha512-yNEsQERO50LM6mQgUWnWFo453wVwrxOzTnCxYgawLggDtt5VuU/U7sAPx1wcHhUvqPbbvwVJgVBnJ+FOOmeZIQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css"
          integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"
            integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
            integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="lookup.js"></script>
</head>
<body>
<!--    Lookup filter -->
<div style="padding: 10px; gap: 10px; display: flex; flex-direction: column; position: fixed; top: 0; width: 100%; background: white; z-index: 10">
        <span style="display: flex; align-items: center; gap: 10px">
            <button class="btn btn-secondary" onclick="window.location.href = 'dashboard.html'">X</button>
            <label style="margin-bottom: 0" for="produce-name" class="form-label"><b>Warehouse Search</b></label>
        </span>

    <div class="lookup-top-bar">
        <span style="display: grid ; gap: 10px; grid-template-columns: 1.5fr 1fr 1fr">
        <input class="form-control" style="width: 100%" name="produce-name" id="produce-name"
               placeholder="Name or Batch ID" oninput="debounceSearch(150)">

        <!-- Replacing maximum shelf life with harvest date range.
        This is more flexible and more intuitive than “maximum shelf life.”
        Workers often think in terms of when something came in, not how many days remain. It helps people track
        fresh arrivals and isolate older stock.
        Also, it’s more likely to be available as clean input (date picker)
        -->
        <input id="harvest-date-range" type="text" class="form-control" placeholder="Harvest Date (Range YYYY-MM-DD)">

        <select id="status-dropdown" class="form-control" onchange="debounceSearch()">
            <option value="">Any Status</option>
            <option selected value="instore">In Warehouse</option>
            <option value="available">Available</option>
            <option value="marked">Marked for export</option>
            <option value="exported">Exported</option>
            <option value="discarded">Discarded</option>


        </select>
        </span>
        <span style="display: grid; gap: 10px; grid-template-columns: 1fr 58px;">

                <select id="sort-dropdown" class="form-control" onchange="debounceSearch()">
                    <option value="">Sort By...</option>
                    <option value="batch_id">Batch ID</option>
                    <option value="harvest_type_name">Name</option>
                    <option value="weight">Weight</option>
                    <option value="quantity">Quantity</option>
                    <option value="harvest_date">Harvest Date/Time</option>
                    <option value="remaining_shelf_life">Remaining Shelf Life</option>

                </select>

                <select id="sort-direction" class="form-control" onchange="debounceSearch()">
                    <option value="ascending">     &#x25B2;  </option>
                    <option value="descending">    &#x25BC;  </option>
                </select>

            </span>



    </div>

    <div style="display: grid; grid-template-columns: 1fr; gap: 10px">
        <span style="display: flex; justify-content: space-between">
            <div class="form-check form-check-inline">
                <input class="form-check-input" id="almost-expire-toggle" type="checkbox" onclick="debounceSearch(1)">

                <label class="form-check-label" for="almost-expire-toggle">Show near-expiry only (&le;20% lifespan).</label>
            </div>
            <span style="display: flex; align-items: center">
                <button onclick="flipPage(-1)" class="btn btn-link"><</button>
                <p style="margin: 0"><span class="hide-on-mobile">Page</span> <span id="page-counter">1</span></p>
                <button onclick="flipPage(1)" class="btn btn-link">></button>
            </span>
        </span>
        <span style="display: grid; grid-template-columns: 1.5fr 50px 120px 120px; gap: 10px">
            <button class="btn btn-primary" id="search" onclick="debounceSearch(1)">Search</button>
            <button class="btn btn-secondary" onclick="window.location.href = 'scan_batch_qr.html'">QR</button>

            <div class="dropdown">
                  <button style="width: 100%" class="btn btn-secondary dropdown-toggle" href="#" role="button"
                          data-bs-toggle="dropdown" aria-expanded="false">
                    Export as
                  </button>

                  <ul class="dropdown-menu">
                    <li><button class="dropdown-item" onclick="exportToCSV(false)">CSV (Filtered)</button></li>
                    <li><button class="dropdown-item" onclick="exportToXLSX(false)">XLSX (Filtered)</button></li>
                    <li><button class="dropdown-item" onclick="exportToCSV(true)">CSV (All)</button></li>
                    <li><button class="dropdown-item" onclick="exportToXLSX(true)">XLSX (All)</button></li>
                  </ul>
                </div>
                <button class="btn btn-secondary" onclick="clearFilters()">Clear Filter</button>


            </span>

    </div>


</div>


    <div class="card-container" style="padding-bottom: 100px">
    </div>

    <button onclick="runSuggestions()" class="btn btn-outline-primary" style=" backdrop-filter: blur(15px); position: fixed; bottom: 10px; left:10px; right:10px; padding: 10px; font-weight: bold"><span id="suggest-shipment-title"> <i class="bi bi-stars"></i> Suggest shipments</span> <progress hidden id="suggest-shipment-throbber"></progress></button>
</body>
</html>
