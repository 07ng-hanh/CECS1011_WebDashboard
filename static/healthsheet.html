<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sensor Recordings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
          integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.6.0/chart.min.js"
            integrity="sha512-GMGzUEevhWh8Tc/njS0bDpwgxdCJLQBWG3Z2Ct+JGOpVnEmjvNx6ts4v6A2XJf1HOrtOsfhv3hBKpK9kE5z8AQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/4.1.0/cdn.min.js"
            integrity="sha512-bz58Sg3BAWMEMPTH0B8+pK/+5Qfqq6b2Ho2G4ld12x4fiUVqpY8jSbN/73qpBQYFLU4QnKVL5knUm4uqcJGLVw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.min.js"
            integrity="sha512-rwTcVAtpAmT3KnwlKHOqeV7ETOTUdf0uYbR4YGf3149X+X+Rx3tgJOOhqFVsyNl0oMgJSPqAOoFuf57WNN0RYA=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-streaming/2.0.0/chartjs-plugin-streaming.min.js"
            integrity="sha512-pSxAn0V22F4p92VllULJWP5yR5a5FfSPCzHum2P7MrbzmYNiaYsED0UZUF9JzRSZvRlemas5Yqf7F90xFvFthA=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="healthsheet.js"></script>
</head>
<body>
<div style="position: fixed; background: white; width: 100%; z-index: 10">

    <span style="display: flex; flex-direction: column; padding: 10px">
        <span style="padding-bottom: 10px; display: flex; gap: 10px; align-items: center">
            <button class="btn btn-secondary" onclick="window.location.href = 'dashboard.html'">X</button>
            <label style="margin: 0px" for="date-range-for-recordings"><b>Sensor Recordings</b></label>
        </span>
        <span style="display: flex; gap: 10px">
        <select autofocus id="date-range-for-recordings" class="form-control">
            <optgroup label="Short-term (Update every second)">
                <option value = "60000" name="1min">Last minute</option>
                <option value = "300000" name="5min">Last 5 minutes</option>

            </optgroup>
            <optgroup label="Mid-term (Update every 10 seconds)">
                <option value = "1800000" name="30min">Last 30 minutes</option>
                <option value = "3600000" name="1hr">Last 1 hour</option>

            </optgroup>
            <optgroup label="Long-term (Manual refresh)">
                <option value ="28800000" name="8hr">Last 8 hours</option>
                <option value ="43200000" name="12hr">Last 12 hours</option>
                <option value ="86400000" name="24hr">Last 24 hours</option>
                <option value ="172800000" name="2d">Last 2 days</option>
                <option value ="604800000" name="7d">Last 7 days</option>
                <option value ="1209600000" name="14d">Last 14 days</option>
                <option value ="2592000000" name="30d">Last 30 days</option>
            </optgroup>

        </select>
            <button class="btn btn-primary" id="manual-refresh-btn">Refresh</button>
        </span>
    </span>

</div>
<div style="position: absolute; top: 110px; width: 100%">
    <div class="healthsheet-entry">
        <label><b>Temperature (&deg;C)</b></label>
        <div class="chart-container" style="position: relative; height: 200px; width: 100%">
            <canvas id="temperature-plot"></canvas>
        </div>
    </div>
    <div class="healthsheet-entry">
        <label><b>Humidity (%)</b></label>
        <div class="chart-container" style="position: relative; height: 200px; width: 100%">
            <canvas id="humidity-plot"></canvas>
        </div>
    </div>
    <div class="healthsheet-entry">
        <label><b>CO2 Concentration (ppm)</b></label>
        <div class="chart-container" style="position: relative; height: 200px; width: 100%">
            <canvas id="co2-plot"></canvas>
        </div>

    </div>
</div>
</body>
</html>
