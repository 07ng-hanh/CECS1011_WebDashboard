<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Environmental Data</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
          integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/litepicker.min.js"
            integrity="sha512-yNEsQERO50LM6mQgUWnWFo453wVwrxOzTnCxYgawLggDtt5VuU/U7sAPx1wcHhUvqPbbvwVJgVBnJ+FOOmeZIQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litepicker/2.0.12/css/litepicker.min.css"
          integrity="sha512-wcj3civV5+29DLKdrR2zMcQWSCbWOTqeVPFvOth4zTDBZ7/24DAFTswuqymhGuguAZD3IQ7Te/+ef5WsfTo1zw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <script>
    </script>

</head>
<body>
<div>
        <span style="display: flex; flex-direction: column; padding: 10px">
            <label for="date-range-for-recordings"><b>View sensor recordings for the last:</b></label>
            <select id="date-range-for-recordings" class="form-control">
                <optgroup label="Short-term">
                    <option name="1hr">1 hour</option>
                    <option name="1hr">4 hours</option>
                    <option name="1hr">8 hours</option>
                    <option name="12hr">12 hours</option>
                    <option name="24hr">24 hours</option>
                </optgroup>
                <optgroup label="Long-term">
                    <option name="2d">2 days</option>
                    <option name="2d">7 days</option>
                    <option name="2d">14 days</option>
                    <option name="2d">30 days</option>
                </optgroup>

            </select>
        </span>
</div>

<div style="padding-left: 10px; padding-right: 10px; padding-bottom: 10px">
    <label><b>Temperature</b></label>
</div>
<div style="padding-left: 10px; padding-right: 10px; padding-bottom: 10px">
    <label><b>Humidity</b></label>
</div>
<div style="padding-left: 10px; padding-right: 10px; padding-bottom: 10px">
    <label><b>CO2 Concentration</b></label>
</div>
</body>
</html>
